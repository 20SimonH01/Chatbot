// ===== BOT RESPONSE LOGIC =====

function getBotResponse(action) {
  switch (action.type) {
    case "showSubcategories": {
      const subs = SUBCATEGORY_MAP[action.categoryId] || [];
      return {
        content: "Was ist Ihr Anliegen?",
        buttons: subs.map(s => ({
          id: s.id, label: s.label,
          action: s.isFreitext
            ? { type: "showFreitext", categoryLabel: action.categoryLabel, subcategoryLabel: s.label }
            : s.hasDetail
            ? { type: "showDetails", categoryId: action.categoryId, categoryLabel: action.categoryLabel, subcategoryId: s.id, subcategoryLabel: s.label, isBeratung: s.isBeratung || false }
            : { type: "showEndMessage", categoryLabel: action.categoryLabel, subcategoryLabel: s.label, isWartung: s.isWartung || false, isBeratung: s.isBeratung || false },
        })),
        buttonsLayout: "pills",
      };
    }
    case "showDetails": {
      const key = `${action.categoryId}.${action.subcategoryId}`;
      const details = DETAIL_MAP[key] || [];
      const needsHersteller = action.categoryId === "heizung" && action.subcategoryId === "stoerung";
      return {
        content: "Was genau ist das Problem?",
        buttons: details.map(d => ({
          id: d.id, label: d.label, urgent: d.urgent || false,
          action: d.id === "sonstiges"
            ? { type: "showFreitext", categoryLabel: action.categoryLabel, subcategoryLabel: action.subcategoryLabel }
            : needsHersteller
            ? { type: "showHersteller", categoryLabel: action.categoryLabel, subcategoryLabel: action.subcategoryLabel, detail: d.label, urgent: d.urgent || false }
            : { type: "showEndMessage", categoryLabel: action.categoryLabel, subcategoryLabel: action.subcategoryLabel, detail: d.label, urgent: d.urgent || false, isBeratung: action.isBeratung || false },
        })),
        buttonsLayout: "list",
      };
    }
    case "showHersteller":
      return {
        content: "Welcher Hersteller ist verbaut? Das hilft dem Techniker bei der Vorbereitung.",
        buttons: HEIZUNG_HERSTELLER.map(h => ({
          label: h,
          action: { type: "showEndMessage", categoryLabel: action.categoryLabel, subcategoryLabel: action.subcategoryLabel, detail: action.detail, hersteller: h, urgent: action.urgent || false },
        })),
        buttonsLayout: "hersteller",
      };
    case "showEndMessage": {
      let content;
      if (action.isBeratung) content = "Prima, ich notiere das. Mein Kollege klärt beim Beratungstermin alles direkt vor Ort.";
      else if (action.isWartung) content = "Ich notiere eine Wartungsanfrage. Wann würde es Ihnen passen?";
      else if (action.urgent) content = "Ich habe Ihr Anliegen notiert. Damit schnell jemand zu Ihnen kommt, fragen wir direkt einen Termin an.";
      else content = "Ich habe alles notiert. Sie können mir noch mehr beschreiben oder direkt einen Termin anfragen.";
      return {
        content,
        buttons: [{ label: "Termin anfragen", primary: true, action: { type: "openTermin" } }],
        buttonsLayout: "action",
      };
    }
    case "showNotdienst":
      return {
        content: "Bei akuter Gefahr — Brand oder Gasgeruch: sofort Feuerwehr 112 anrufen.\n\nSonst: Gerät, Haupthahn oder Hauptschalter abschalten und unseren Notdienst anrufen: +49 681 9999999\n\nWas ist Ihr Notfall?",
        buttons: NOTDIENST_BUTTONS.map(b => ({ ...b, urgent: true, action: { type: "notdienstType", typeId: b.id } })),
        buttonsLayout: "list",
        isNotdienst: true,
      };
    case "notdienstType":
      return {
        content: NOTDIENST_TEXT[action.typeId] || "Rufen Sie unseren Notdienst: +49 681 9999999.",
        buttons: [{ label: "Notdienst anrufen: +49 681 9999999", primary: true, urgent: true, action: { type: "callNotdienst" } }],
        buttonsLayout: "action",
      };
    case "showFreitext":
      return {
        content: "Beschreiben Sie kurz, worum es geht – ein, zwei Sätze genügen. Ich frage bei Bedarf nach und helfe Ihnen weiter. Ein Foto können Sie auch direkt anhängen.",
      };
    case "goHome":
      return {
        content: "Womit kann ich Ihnen noch helfen?",
        buttons: MENU_BUTTONS,
        buttonsLayout: "pills",
      };
    default:
      return null;
  }
}

// ===== HELPER COMPONENTS =====

function Label({ children, required }) {
  return (
    <label style={{ display: "block", fontSize: "11px", fontWeight: "600", color: colors.textLight, marginBottom: "4px", textTransform: "uppercase", letterSpacing: "0.06em" }}>
      {children}{required && <span style={{ color: colors.urgent }}> *</span>}
    </label>
  );
}

function Field({ label, value, onChange, type = "text", placeholder, error, required, disabled }) {
  return (
    <div style={{ marginBottom: "11px" }}>
      <Label required={required}>{label}</Label>
      <input type={type} value={value} onChange={onChange} placeholder={placeholder} disabled={disabled}
        style={{
          width: "100%",
          border: error ? `1.5px solid ${colors.urgent}` : G.formFieldBorder,
          borderRadius: "9px",
          padding: "9px 12px",
          fontSize: "13px",
          outline: "none",
          color: colors.text,
          fontFamily: "inherit",
          boxSizing: "border-box",
          background: disabled ? "rgba(255,255,255,0.38)" : error ? "rgba(254,242,242,0.80)" : G.formFieldBg,
          backdropFilter: G.blurLight,
          WebkitBackdropFilter: G.blurLight,
          boxShadow: error ? "inset 0 2px 4px rgba(220,38,38,0.08)" : G.formFieldShadow,
          cursor: disabled ? "not-allowed" : "text",
        }} />
      {error && <div style={{ fontSize: "11px", color: colors.urgent, marginTop: "3px" }}>{error}</div>}
    </div>
  );
}

function Kalender({ value, onSelect }) {
  const heute = new Date();
  heute.setHours(0, 0, 0, 0);
  const maxDatum = new Date(heute.getFullYear(), heute.getMonth() + 12, heute.getDate());
  const basis = value ? new Date(value + "T00:00:00") : heute;
  const [monat, setMonat] = useState(new Date(basis.getFullYear(), basis.getMonth(), 1));
  const popupRef = useRef(null);
  useEffect(() => { popupRef.current?.scrollIntoView({ block: "nearest", behavior: "smooth" }); }, []);
  const jahr = monat.getFullYear();
  const mIdx = monat.getMonth();
  const tageImMonat = new Date(jahr, mIdx + 1, 0).getDate();
  const offset = (new Date(jahr, mIdx, 1).getDay() + 6) % 7;
  const zellen = [...Array(offset).fill(null), ...Array.from({ length: tageImMonat }, (_, i) => i + 1)];
  const ersterMonat = jahr === heute.getFullYear() && mIdx === heute.getMonth();
  const letzterMonat = jahr === maxDatum.getFullYear() && mIdx === maxDatum.getMonth();
  const navStyle = (disabled) => ({
    width: "28px", height: "28px", border: G.btnBorder, borderRadius: "8px",
    background: disabled ? "rgba(255,255,255,0.28)" : G.btnBg,
    backdropFilter: disabled ? "none" : G.blurLight,
    WebkitBackdropFilter: disabled ? "none" : G.blurLight,
    boxShadow: disabled ? "none" : G.btnShadow,
    cursor: disabled ? "default" : "pointer",
    color: disabled ? "#CBD5E1" : colors.primary,
    fontSize: "15px", fontWeight: "700", fontFamily: "inherit",
  });
  return (
    <div ref={popupRef} style={{
      position: "absolute", top: "calc(100% + 6px)", left: 0, width: "252px",
      background: G.popupBg,
      backdropFilter: G.popupBlur,
      WebkitBackdropFilter: G.popupBlur,
      border: G.popupBorder,
      borderRadius: "14px",
      boxShadow: G.popupShadow,
      padding: "12px", zIndex: 50,
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "10px" }}>
        <button type="button" disabled={ersterMonat} onClick={() => setMonat(new Date(jahr, mIdx - 1, 1))} style={navStyle(ersterMonat)}>‹</button>
        <div style={{ fontSize: "13px", fontWeight: "700", color: colors.text }}>{MONATE[mIdx]} {jahr}</div>
        <button type="button" disabled={letzterMonat} onClick={() => setMonat(new Date(jahr, mIdx + 1, 1))} style={navStyle(letzterMonat)}>›</button>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: "2px", marginBottom: "4px" }}>
        {WOCHENTAGE.map((w) => <div key={w} style={{ textAlign: "center", fontSize: "10px", fontWeight: "600", color: colors.textLight, padding: "2px 0" }}>{w}</div>)}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: "2px" }}>
        {zellen.map((tag, i) => {
          if (tag === null) return <div key={`leer-${i}`} />;
          const datum = new Date(jahr, mIdx, tag);
          const iso = toISO(datum);
          const gesperrt = datum < heute || datum > maxDatum;
          const istHeute = iso === toISO(heute);
          const gewaehlt = value === iso;
          return (
            <button key={iso} type="button" disabled={gesperrt} onClick={() => onSelect(iso)}
              style={{
                height: "30px", borderRadius: "8px", fontSize: "12px", fontFamily: "inherit",
                border: gewaehlt ? "1px solid rgba(27,61,111,0.40)" : istHeute ? `1.5px solid ${colors.primaryLight}` : "1px solid transparent",
                background: gewaehlt
                  ? `linear-gradient(145deg, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0) 55%), rgba(27,61,111,0.88)`
                  : "transparent",
                backdropFilter: gewaehlt ? G.blurLight : "none",
                WebkitBackdropFilter: gewaehlt ? G.blurLight : "none",
                boxShadow: gewaehlt ? "inset 0 1px 0 rgba(255,255,255,0.38)" : "none",
                color: gesperrt ? "#CBD5E1" : gewaehlt ? "white" : colors.text,
                fontWeight: gewaehlt || istHeute ? "700" : "400",
                cursor: gesperrt ? "default" : "pointer",
                transition: "all 0.13s",
              }}
              onMouseEnter={(e) => { if (!gesperrt && !gewaehlt) { e.currentTarget.style.background = G.btnBg; e.currentTarget.style.backdropFilter = G.blurLight; } }}
              onMouseLeave={(e) => { if (!gewaehlt) { e.currentTarget.style.background = "transparent"; e.currentTarget.style.backdropFilter = "none"; } }}>
              {tag}
            </button>
          );
        })}
      </div>
    </div>
  );
}

function SHKChatbot() {
  const [isOpen, setIsOpen] = useState(false);
  const [isClosing, setIsClosing] = useState(false);
  const [step, setStep] = useState("chat");
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [isLoading, setIsLoading] = useState(false);
  const [pendingImage, setPendingImage] = useState(null);
  const [chatContext, setChatContext] = useState({ category: "", subcategory: "", detail: "", hersteller: "" });
  const [kundenTyp, setKundenTyp] = useState("neu");
  const [kundennummer, setKundennummer] = useState("");
  const [loginName, setLoginName] = useState("");
  const [loginFehler, setLoginFehler] = useState("");
  const [eingeloggterKunde, setEingeloggterKunde] = useState(null);
  const [form, setForm] = useState({ name: "", telefon: "", email: "", strasse: "", datum: "", wunschzeit: "", nachricht: "" });
  const [fehler, setFehler] = useState({});
  const [kalenderOffen, setKalenderOffen] = useState(false);
  const [sendet, setSendet] = useState(false);
  const [sendefehler, setSendefehler] = useState("");
  const [gemuted, setGemuted] = useState(false);
  const [menuOffen, setMenuOffen] = useState(false);
  const [ungelesen, setUngelesen] = useState(true);
  const [chatScrolledUp, setChatScrolledUp] = useState(false);

  const kalenderRef = useRef(null);
  const menuRef = useRef(null);
  const menuDropdownRef = useRef(null);
  const messagesEndRef = useRef(null);
  const inputRef = useRef(null);
  const fileInputRef = useRef(null);
  const scrollRef = useRef(null);

  const handleChatScroll = (e) => {
    const el = e.currentTarget;
    const distanceFromBottom = el.scrollHeight - el.scrollTop - el.clientHeight;
    setChatScrolledUp(distanceFromBottom > 80);
  };

  const showHomeButton = step !== "chat" || chatScrolledUp;

  useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);
  useEffect(() => { if (step === "chat") inputRef.current?.focus(); }, [step]);

  useEffect(() => {
    if (isOpen && messages.length === 0) {
      setMessages([{
        role: "assistant",
        content: "Hallo, wie kann ich Ihnen behilflich sein?",
        meta: "Support-Assistent · gerade eben",
        buttons: MENU_BUTTONS,
        buttonsLayout: "pills",
      }]);
    }
  }, [isOpen]);

  useEffect(() => {
    if (!kalenderOffen) return;
    const h = (e) => { if (kalenderRef.current && !kalenderRef.current.contains(e.target)) setKalenderOffen(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, [kalenderOffen]);

  useEffect(() => {
    if (!menuOffen) return;
    const h = (e) => {
      if (menuRef.current && !menuRef.current.contains(e.target) && menuDropdownRef.current && !menuDropdownRef.current.contains(e.target)) setMenuOffen(false);
    };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, [menuOffen]);

  const closeChat = () => { setIsClosing(true); setTimeout(() => { setIsOpen(false); setIsClosing(false); }, 195); };
  const updateForm = (key, val) => { setForm((f) => ({ ...f, [key]: val })); setFehler((f) => (f[key] ? { ...f, [key]: undefined } : f)); };

  const playClick = () => {
    if (gemuted) return;
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 600; osc.type = "sine";
      gain.gain.setValueAtTime(0.06, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
      osc.start(); osc.stop(ctx.currentTime + 0.08);
    } catch {}
  };

  const handleButtonClick = (btn) => {
    playClick();
    const { action } = btn;
    if (action.categoryLabel) setChatContext(c => ({ ...c, category: action.categoryLabel }));
    if (action.subcategoryLabel) setChatContext(c => ({ ...c, subcategory: action.subcategoryLabel }));
    if (action.detail) setChatContext(c => ({ ...c, detail: action.detail }));
    if (action.hersteller) setChatContext(c => ({ ...c, hersteller: action.hersteller }));
    if (action.type === "callNotdienst") { window.location.href = "tel:+496819999999"; return; }
    if (action.type === "openTermin") {
      setMessages(prev => { const u = [...prev]; u.push({ role: "user", content: btn.label, isChoice: true }); return u; });
      if (eingeloggterKunde) setForm(f => ({ ...f, name: eingeloggterKunde.name, telefon: eingeloggterKunde.telefon, email: eingeloggterKunde.email, strasse: eingeloggterKunde.strasse }));
      setStep("termin"); return;
    }
    const nextMsg = getBotResponse(action);
    setMessages(prev => { const u = [...prev]; u.push({ role: "user", content: btn.label, isChoice: true }); if (nextMsg) u.push({ role: "assistant", ...nextMsg }); return u; });
  };

  const goHome = () => {
    const resp = getBotResponse({ type: "goHome" });
    setMessages(prev => [...prev, { role: "assistant", ...resp }]);
    setChatContext({ category: "", subcategory: "", detail: "", hersteller: "" });
  };

  const handleFileSelect = async (e) => {
    let file = e.target.files[0];
    if (!file) return;
    e.target.value = "";
    const isHeic = file.type === "image/heic" || file.type === "image/heif" || file.name.toLowerCase().endsWith(".heic") || file.name.toLowerCase().endsWith(".heif");
    if (!file.type.startsWith("image/") && !isHeic) { alert("Nur Bilddateien erlaubt."); return; }
    if (isHeic) {
      try {
        const blob = await heic2any({ blob: file, toType: "image/jpeg", quality: 0.85 });
        file = new File([blob], file.name.replace(/\.heic$/i, ".jpg"), { type: "image/jpeg" });
      } catch { alert("HEIC-Konvertierung fehlgeschlagen. Bitte in den iPhone-Einstellungen Kamera → Format → Maximale Kompatibilität aktivieren."); return; }
    }
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const MAX = 1500;
        let w = img.naturalWidth, h = img.naturalHeight;
        if (w > MAX || h > MAX) { if (w > h) { h = Math.round(h * MAX / w); w = MAX; } else { w = Math.round(w * MAX / h); h = MAX; } }
        const canvas = document.createElement("canvas"); canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
        setPendingImage({ base64: dataUrl.split(",")[1], mediaType: "image/jpeg", previewUrl: dataUrl });
      };
      img.onerror = () => alert("Bild konnte nicht gelesen werden.");
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  const sendMessage = async () => {
    if ((!input.trim() && !pendingImage) || isLoading) return;
    let userContent = pendingImage
      ? [{ type: "image", source: { type: "base64", media_type: pendingImage.mediaType, data: pendingImage.base64 } }, { type: "text", text: input.trim() || "Bitte analysiere dieses Bild im Kontext meines Anliegens." }]
      : input.trim();
    const userMsg = { role: "user", content: userContent, displayText: input.trim() || "Foto gesendet", previewUrl: pendingImage?.previewUrl || null };
    const newMessages = [...messages, userMsg];
    setMessages(newMessages);
    setInput(""); setPendingImage(null); setIsLoading(true);
    try {
      const apiMessages = newMessages.map((m) => ({ role: m.role, content: typeof m.content === "string" ? m.content : m.content }));
      const res = await fetch("/api/chat", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1000, category: chatContext.category, subcategory: chatContext.subcategory || chatContext.detail, hersteller: chatContext.hersteller || undefined, messages: apiMessages }),
      });
      const data = await res.json();
      setMessages([...newMessages, { role: "assistant", content: data.content[0].text }]);
    } catch { setMessages([...newMessages, { role: "assistant", content: "Technischer Fehler. Bitte kontaktieren Sie uns direkt." }]); }
    setIsLoading(false);
  };

  const loginAlsBestandskunde = () => {
    setLoginFehler("");
    const kunde = KUNDENDATENBANK[kundennummer.trim()];
    if (!kunde) { setLoginFehler("Kundennummer nicht gefunden."); return; }
    if (kunde.name.toLowerCase() !== loginName.trim().toLowerCase()) { setLoginFehler("Name stimmt nicht überein."); return; }
    setEingeloggterKunde({ ...kunde, kundennummer: kundennummer.trim() });
    setForm(f => ({ ...f, name: kunde.name, telefon: kunde.telefon, email: kunde.email, strasse: kunde.strasse }));
  };

  const validieren = () => {
    const e = {};
    if (!form.name.trim()) e.name = "Pflichtfeld";
    if (!form.telefon.trim()) e.telefon = "Pflichtfeld";
    if (!form.email.trim()) e.email = "Pflichtfeld";
    else if (!/\S+@\S+\.\S+/.test(form.email)) e.email = "Ungültige E-Mail";
    if (!form.strasse.trim()) e.strasse = "Pflichtfeld";
    if (!form.datum) e.datum = "Pflichtfeld";
    setFehler(e);
    return Object.keys(e).length === 0;
  };

  const absenden = async () => {
    if (!validieren()) return;
    setSendet(true); setSendefehler("");
    try {
      const res = await fetch("/api/termin", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ...form, bereich: chatContext.category, anliegen: chatContext.subcategory || chatContext.detail, hersteller: chatContext.hersteller || undefined }),
      });
      if (!res.ok) throw new Error("Server-Fehler " + res.status);
      setStep("bestaetigung");

  };

  const reset = () => {
    setMessages([]); setInput(""); setPendingImage(null);
    setChatContext({ category: "", subcategory: "", detail: "", hersteller: "" });

    setKundenTyp("neu"); setKundennummer(""); setLoginName(""); setLoginFehler(""); setEingeloggterKunde(null);

            onMouseLeave={e => { e.currentTarget.style.transform = "translateY(0)"; e.currentTarget.style.boxShadow = btn.urgent ? G.urgentPillShadow : G.btnShadow; }}>
            {btn.label}
          </button>

    if (layout === "hersteller") return (

          {/* Termin-Shortcut — glass */}
          {step === "chat" && messages.length > 0 && !isLoading && (
            <div style={{ padding: "0 16px 8px", flexShrink: 0 }}>
              <button onClick={() => { if (eingeloggterKunde) setForm(f => ({ ...f, name: eingeloggterKunde.name, telefon: eingeloggterKunde.telefon, email: eingeloggterKunde.email, strasse: eingeloggterKunde.strasse })); setStep("termin"); }}
                style={{ width: "100%", background: G.btnBg, backdropFilter: G.blurLight, WebkitBackdropFilter: G.blurLight, border: G.btnBorder, boxShadow: G.btnShadow, borderRadius: "10px", padding: "9px", cursor: "pointer", fontSize: "12.5px", color: colors.primary, fontWeight: "600", fontFamily: "inherit", letterSpacing: "0.01em", transition: "all 0.16s cubic-bezier(0.22,1,0.36,1)" }}
                onMouseEnter={e => { e.currentTarget.style.transform = "translateY(-1px)"; e.currentTarget.style.boxShadow = `${G.btnShadow}, 0 4px 12px rgba(0,0,0,0.10)`; }}
                onMouseLeave={e => { e.currentTarget.style.transform = "translateY(0)"; e.currentTarget.style.boxShadow = G.btnShadow; }}>
                📅 Termin anfragen
              </button>
            </div>
          )}

          {/* Input bar — glass */}
          {step === "chat" && (
            <div style={{ padding: "10px 16px 14px", background: G.barBg, backdropFilter: G.blurMid, WebkitBackdropFilter: G.blurMid, borderTop: G.barBorder, boxShadow: G.barShadow, flexShrink: 0 }}>
              {pendingImage && (
                <div style={{ marginBottom: "8px", position: "relative", display: "inline-block" }}>
                  <img src={pendingImage.previewUrl} alt="Vorschau" style={{ height: "60px", borderRadius: "8px", border: G.primaryBorder, display: "block" }} />
                  <button onClick={() => setPendingImage(null)} style={{ position: "absolute", top: "-6px", right: "-6px", width: "18px", height: "18px", borderRadius: "50%", background: G.urgentCtaBg, border: G.urgentCtaBorder, color: "white", fontSize: "11px", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>×</button>
                </div>
              )}
              <div style={{ display: "flex", gap: "8px", alignItems: "center" }}>
                <input ref={fileInputRef} type="file" accept="image/*" onChange={handleFileSelect} style={{ display: "none" }} />
                <button onClick={() => fileInputRef.current?.click()}
                  style={{ background: pendingImage ? G.primaryBg : "transparent", backdropFilter: pendingImage ? G.blurLight : "none", WebkitBackdropFilter: pendingImage ? G.blurLight : "none", border: pendingImage ? G.primaryBorder : "none", boxShadow: pendingImage ? G.primaryShadow : "none", borderRadius: "8px", padding: "8px", cursor: "pointer", color: pendingImage ? "white" : colors.textLight, flexShrink: 0, display: "flex", alignItems: "center", transition: "all 0.15s" }}
                  onMouseEnter={e => { if (!pendingImage) { e.currentTarget.style.color = colors.primary; e.currentTarget.style.background = G.btnBg; } }}
                  onMouseLeave={e => { if (!pendingImage) { e.currentTarget.style.color = colors.textLight; e.currentTarget.style.background = "transparent"; } }}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                </button>
                <input ref={inputRef} value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === "Enter" && sendMessage()}
                  placeholder={pendingImage ? "Beschreibung hinzufügen..." : "Nachricht schreiben…"}
                  style={{ flex: 1, background: G.fieldBg, backdropFilter: G.blurLight, WebkitBackdropFilter: G.blurLight, border: G.fieldBorder, boxShadow: G.fieldShadow, borderRadius: "22px", padding: "9px 14px", fontSize: "13.5px", outline: "none", color: colors.text, fontFamily: "inherit", transition: "border-color 0.15s, box-shadow 0.15s" }}
                  onFocus={e => { e.target.style.borderColor = "rgba(43,94,167,0.55)"; e.target.style.boxShadow = `${G.fieldShadow}, 0 0 0 3px rgba(27,61,111,0.08)`; }}
                  onBlur={e => { e.target.style.borderColor = "rgba(255,255,255,0.55)"; e.target.style.boxShadow = G.fieldShadow; }} />
                <button onClick={sendMessage} disabled={!inputHasContent}
                  style={{ background: inputHasContent ? G.sendActiveBg : G.sendInactiveBg, backdropFilter: G.blurLight, WebkitBackdropFilter: G.blurLight, border: inputHasContent ? G.sendActiveBorder : G.sendInactiveBorder, boxShadow: inputHasContent ? G.sendActiveShadow : "none", borderRadius: "50%", width: "36px", height: "36px", cursor: inputHasContent ? "pointer" : "not-allowed", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.16s cubic-bezier(0.22,1,0.36,1)" }}
                  onMouseEnter={e => { if (inputHasContent) { e.currentTarget.style.transform = "scale(1.06)"; } }}
                  onMouseLeave={e => { e.currentTarget.style.transform = "scale(1)"; }}>
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={inputHasContent ? "white" : colors.textLight} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
                </button>
              </div>
            </div>
          )}
        </div>
      )}

      <style>{`
        @import url('https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap');

        @keyframes shkDotWave {
          0%, 100% { transform: translateY(0) scale(0.9); opacity: 0.50; }
          50%        { transform: translateY(-5px) scale(1); opacity: 1; }
        }
        @keyframes shkSilkBg {
          0%, 100% { background-position: 0% 50%; }
          33%       { background-position: 60% 0%; }
          66%       { background-position: 100% 50%; }
        }
        @keyframes shkSilk1 {
          0%, 100% { transform: translate(0%, 0%); }
          25%  { transform: translate(10%, -14%); }
          50%  { transform: translate(-6%, 10%); }
          75%  { transform: translate(14%, 6%); }
        }
        @keyframes shkSilk2 {
          0%, 100% { transform: translate(0%, 0%); }
          30%  { transform: translate(-14%, 8%); }
          60%  { transform: translate(8%, -12%); }
          80%  { transform: translate(-10%, -6%); }
        }
        @keyframes shkSilk3 {
          0%, 100% { transform: translate(0%, 0%); }
          40%  { transform: translate(-12%, -10%); }
          70%  { transform: translate(10%, 12%); }
        }
        @keyframes shkMenuItemIn {
          from { opacity: 0; transform: translateY(-8px) scale(0.97); }
          to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes shkWidgetIn {
          from { opacity: 0; transform: scale(0.94) translateY(10px); }
          to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes shkWidgetOut {
          from { opacity: 1; transform: scale(1) translateY(0); }
          to   { opacity: 0; transform: scale(0.94) translateY(10px); }
        }
        @keyframes shkMsgIn {
          from { opacity: 0; transform: translateY(10px); filter: blur(6px); }
          to   { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        @supports not (backdrop-filter: blur(1px)) {
          /* Fallback: ramp up opacity so content stays readable without blur */
        }
        @media (prefers-reduced-motion: reduce) {
          @keyframes shkWidgetIn  { from { opacity: 0; } to { opacity: 1; } }
          @keyframes shkWidgetOut { from { opacity: 1; } to { opacity: 0; } }
          @keyframes shkMsgIn     { from { opacity: 0; } to { opacity: 1; } }
          @keyframes shkDotWave   { 0%, 100% { opacity: 0.45; } 50% { opacity: 1; } }
        }
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(SHKChatbot));
</script>
</body>
</html>
